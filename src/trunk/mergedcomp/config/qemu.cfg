#  Trunk — QEMU launch configuration

# --- Binary ------------------------------------------------------------------
QEMU_BIN="qemu-system-x86_64"

# --- Machine -----------------------------------------------------------------
QEMU_MACHINE="q35"
QEMU_ACCEL_TCG="tcg"
QEMU_ACCEL_KVM="kvm"
QEMU_CPU_BASIC="qemu64"
QEMU_CPU_KVM="host"

# --- Resources ---------------------------------------------------------------
QEMU_RAM="2G"
QEMU_SMP_CORES="4"
QEMU_SMP_THREADS="1"

# --- Display -----------------------------------------------------------------
QEMU_DISPLAY="sdl"
QEMU_VGA="std"

# --- Serial ------------------------------------------------------------------
QEMU_SERIAL="stdio"

# --- Artifacts ---------------------------------------------------------------
QEMU_ISO="build/iso/trunk.iso"
QEMU_DISK="build/img/trunk.img"
QEMU_LOG="build/logs/qemu"

# --- GDB ---------------------------------------------------------------------
QEMU_GDB_PORT="1234"

# --- UEFI Firmware (OVMF) ----------------------------------------------------
# common.sh get_uefi_flags() searches these paths automatically.
# Override here if your OVMF is in a non-standard location.
# Leave blank to let get_uefi_flags() auto-detect.
QEMU_OVMF_PATH=""

# Common candidate paths (auto-detected by get_uefi_flags if QEMU_OVMF_PATH is empty):
#   /usr/share/ovmf/OVMF.fd
#   /usr/share/OVMF/OVMF.fd
#   /usr/share/edk2/ovmf/OVMF.fd
#   /usr/share/qemu/OVMF.fd
#
# Install OVMF:
#   sudo apt install ovmf        (Debian/Ubuntu)
#   sudo pacman -S edk2-ovmf     (Arch)

# --- Common flags ------------------------------------------------------------
QEMU_FLAGS_COMMON="-no-reboot"