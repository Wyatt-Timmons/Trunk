#  Trunk — Disk image configuration

# --- Image -------------------------------------------------------------------
DISK_IMAGE="build/img/trunk.img"
DISK_SIZE="1G"

# --- Partition table ---------------------------------------------------------
DISK_TABLE="gpt"

# --- EFI System Partition (ESP) ----------------------------------------------
# Primary boot partition — GRUB EFI binary + grub.cfg live here
# Must be FAT32 and flagged as ESP for UEFI firmware to find it
BOOT_PART_NAME="TRUNK_BOOT"
BOOT_PART_START="1MiB"
BOOT_PART_END="256MiB"
BOOT_PART_FS="fat32"
BOOT_PART_FLAGS="esp"         # UEFI ESP flag — required for UEFI boot

# --- Root Partition ----------------------------------------------------------
# Kernel ELF + future filesystem content
ROOT_PART_NAME="TRUNK_ROOT"
ROOT_PART_START="256MiB"
ROOT_PART_END="100%"
ROOT_PART_FS="ext2"

# --- GRUB --------------------------------------------------------------------
GRUB_TARGET_UEFI="x86_64-efi"
GRUB_TARGET_BIOS="i386-pc"